name: Build & Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: Build DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build universal DMG
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          bash scripts/build.sh --version "$VERSION" --universal

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Claude Usage Monitor ${{ github.ref_name }}"
          files: dist/ClaudeUsageMonitor-${{ github.ref_name }}.dmg
          generate_release_notes: true
          body: |
            ## Install

            1. Download **ClaudeUsageMonitor-${{ github.ref_name }}.dmg** below
            2. Open the DMG and drag **ClaudeUsageMonitor** to **Applications**
            3. **First launch only:** right-click the app → **Open** (required because the app is not notarized)

            ## What's new
            <!-- auto-generated from commits below -->
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
