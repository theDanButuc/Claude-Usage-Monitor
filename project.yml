name: ClaudeUsageMonitor

options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15"
  generateEmptyDirectories: true
  defaultConfig: Debug

configs:
  Debug:   debug
  Release: release

targets:
  ClaudeUsageMonitor:
    type: application
    platform: macOS
    deploymentTarget: "13.0"

    sources:
      - path: ClaudeUsageMonitor
        excludes:
          - "Info.plist"
          - "*.entitlements"

    info:
      path: ClaudeUsageMonitor/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: ClaudeUsageMonitor
        CFBundleShortVersionString: "1.1.0"
        CFBundleVersion: "2"

    entitlements:
      path: ClaudeUsageMonitor/ClaudeUsageMonitor.entitlements

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.ClaudeUsageMonitor
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"

schemes:
  ClaudeUsageMonitor:
    build:
      targets:
        ClaudeUsageMonitor: all
    run:
      config: Debug
    archive:
      config: Release
